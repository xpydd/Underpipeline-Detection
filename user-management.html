<script>
let usersData = [
    {
        id: 1,
        username: 'admin',
        name: '张三',
        phone: '13800138001',
        role: 'SUPER_ADMIN',
        roleName: '超级管理员',
        status: 'active',
        lastLogin: '2024-02-20 10:30',
        createTime: '2024-01-01'
    },
    {
        id: 2,
        username: 'lisi',
        name: '李四',
        phone: '13800138002',
        role: 'PROJECT_ADMIN',
        roleName: '项目管理员',
        status: 'active',
        lastLogin: '2024-02-19 15:20',
        createTime: '2024-01-05'
    },
    {
        id: 3,
        username: 'wangwu',
        name: '王五',
        phone: '13800138003',
        role: 'PROJECT_ADMIN',
        roleName: '项目管理员',
        status: 'active',
        lastLogin: '2024-02-18 09:15',
        createTime: '2024-01-10'
    },
    {
        id: 4,
        username: 'zhaoliu',
        name: '赵六',
        phone: '13800138004',
        role: 'SUPER_ADMIN',
        roleName: '超级管理员',
        status: 'inactive',
        lastLogin: '2024-02-10 14:30',
        createTime: '2024-01-15'
    }
];

let editingUserId = null;
let currentPage = 1;
let pageSize = 10;
let filteredUsers = [];

document.addEventListener('DOMContentLoaded', function() {
    filteredUsers = [...usersData];
    renderUserTable();
    setupFilters();
});

function renderUserTable(filteredData = null) {
    const data = filteredData || filteredUsers;
    const totalPages = Math.ceil(data.length / pageSize);
    const startIndex = (currentPage - 1) * pageSize;
    const endIndex = startIndex + pageSize;
    const currentUsers = data.slice(startIndex, endIndex);

    const tbody = document.getElementById('userTableBody');

    if (currentUsers.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-sm text-slate-400">未找到匹配的用户</td></tr>';
        updatePagination(0, 0);
        return;
    }

    tbody.innerHTML = currentUsers.map(user => `
        <tr class="hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors">
            <td class="px-6 py-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-primary/20 to-primary/5 flex items-center justify-center flex-shrink-0">
                        <span class="material-symbols-outlined text-primary text-lg">person</span>
                    </div>
                    <div>
                        <p class="text-sm font-medium text-slate-800 dark:text-white">${user.name}</p>
                        <p class="text-xs text-slate-500 dark:text-slate-400">${user.phone}</p>
                    </div>
                </div>
            </td>
            <td class="px-6 py-4">
                <span class="px-2 py-1 text-xs font-medium bg-primary/10 text-primary rounded">${user.roleName}</span>
            </td>
            <td class="px-6 py-4">
                <span class="px-2 py-1 text-xs font-medium rounded-full ${user.status === 'active' ? 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400' : 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400'}">
                    ${user.status === 'active' ? '启用' : '禁用'}
                </span>
            </td>
            <td class="px-6 py-4">
                <span class="text-sm text-slate-600 dark:text-slate-400">${user.lastLogin || '-'}</span>
            </td>
            <td class="px-6 py-4 text-right">
                <div class="flex items-center justify-end gap-2">
                    <button onclick="showEditUserModal(${user.id})" class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition-colors" title="编辑">
                        <span class="material-symbols-outlined text-base text-slate-600 dark:text-slate-400">edit</span>
                    </button>
                    <button onclick="resetPassword(${user.id})" class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition-colors" title="重置密码">
                        <span class="material-symbols-outlined text-base text-slate-600 dark:text-slate-400">lock_reset</span>
                    </button>
                    <button onclick="toggleUserStatus(${user.id})" class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition-colors" title="${user.status === 'active' ? '禁用' : '启用'}">
                        <span class="material-symbols-outlined text-base text-slate-600 dark:text-slate-400">${user.status === 'active' ? 'block' : 'check_circle'}</span>
                    </button>
                    <button onclick="deleteUser(${user.id})" class="p-1.5 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors" title="删除">
                        <span class="material-symbols-outlined text-base text-red-500">delete</span>
                    </button>
                </div>
            </td>
        </tr>
    `).join('');

    updatePagination(data.length, totalPages);
}

function updatePagination(total, totalPages) {
    document.getElementById('totalUsers').textContent = total;

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const pageNumbers = document.getElementById('pageNumbers');

    prevBtn.disabled = currentPage === 1;
    nextBtn.disabled = currentPage === totalPages || totalPages === 0;

    pageNumbers.innerHTML = '';
    for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
            const btn = document.createElement('button');
            btn.textContent = i;
            btn.className = `px-3 py-1.5 text-sm rounded-lg transition-colors ${i === currentPage ? 'bg-primary text-white' : 'border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800'}`;
            btn.onclick = () => goToPage(i);
            pageNumbers.appendChild(btn);
        } else if (i === currentPage - 2 || i === currentPage + 2) {
            const span = document.createElement('span');
            span.textContent = '...';
            span.className = 'px-2 text-slate-400';
            pageNumbers.appendChild(span);
        }
    }
}

function changePage(direction) {
    if (direction === 'prev' && currentPage > 1) {
        currentPage--;
        renderUserTable();
    } else if (direction === 'next') {
        const totalPages = Math.ceil(filteredUsers.length / pageSize);
        if (currentPage < totalPages) {
            currentPage++;
            renderUserTable();
        }
    }
}

function goToPage(page) {
    currentPage = page;
    renderUserTable();
}

function showAddUserModal() {
    editingUserId = null;
    document.getElementById('userModalTitle').textContent = '新增用户';
    document.getElementById('nameInput').value = '';
    document.getElementById('phoneInput').value = '';
    document.getElementById('roleInput').value = '';
    document.getElementById('userModal').classList.remove('hidden');
}

function showEditUserModal(userId) {
    const user = usersData.find(u => u.id === userId);
    if (!user) return;

    editingUserId = userId;
    document.getElementById('userModalTitle').textContent = '编辑用户';
    document.getElementById('nameInput').value = user.name;
    document.getElementById('phoneInput').value = user.phone;
    document.getElementById('roleInput').value = user.role;
    document.getElementById('userModal').classList.remove('hidden');
}

function closeUserModal() {
    document.getElementById('userModal').classList.add('hidden');
}

function saveUser() {
    const name = document.getElementById('nameInput').value.trim();
    const phone = document.getElementById('phoneInput').value.trim();
    const role = document.getElementById('roleInput').value;

    if (!name || !phone || !role) {
        alert('请填写必填项');
        return;
    }

    const roleNames = {
        'SUPER_ADMIN': '超级管理员',
        'PROJECT_ADMIN': '项目管理员'
    };

    if (editingUserId) {
        const user = usersData.find(u => u.id === editingUserId);
        if (user) {
            user.username = phone;
            user.name = name;
            user.phone = phone;
            user.role = role;
            user.roleName = roleNames[role];
        }
    } else {
        usersData.push({
            id: Date.now(),
            username: phone,
            name,
            phone,
            role,
            roleName: roleNames[role],
            status: 'active',
            lastLogin: null,
            createTime: new Date().toISOString().split('T')[0],
            password: '123456' // 系统默认密码
        });
    }

    closeUserModal();
    renderUserTable();
}

function toggleUserStatus(userId) {
    const user = usersData.find(u => u.id === userId);
    if (user) {
        user.status = user.status === 'active' ? 'inactive' : 'active';
        renderUserTable();
    }
}

function resetPassword(userId) {
    const user = usersData.find(u => u.id === userId);
    if (!user) return;
    
    if (confirm(`确定要重置用户"${user.name}"的密码吗？`)) {
        alert('密码已重置为: 123456');
    }
}

function deleteUser(userId) {
    const user = usersData.find(u => u.id === userId);
    if (!user) return;

    if (confirm(`确定要删除用户"${user.name}"吗？`)) {
        const index = usersData.findIndex(u => u.id === userId);
        if (index !== -1) {
            usersData.splice(index, 1);
            renderUserTable();
        }
    }
}

function setupFilters() {
    const searchInput = document.getElementById('searchInput');
    const roleFilter = document.getElementById('roleFilter');
    const statusFilter = document.getElementById('statusFilter');

    searchInput.addEventListener('input', applyFilters);
    roleFilter.addEventListener('change', applyFilters);
    statusFilter.addEventListener('change', applyFilters);
}

function applyFilters() {
    const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
    const roleFilter = document.getElementById('roleFilter').value;
    const statusFilter = document.getElementById('statusFilter').value;

    filteredUsers = usersData;

    if (keyword) {
        filteredUsers = filteredUsers.filter(user =>
            user.username.toLowerCase().includes(keyword) ||
            user.name.toLowerCase().includes(keyword) ||
            user.phone.includes(keyword)
        );
    }

    if (roleFilter) {
        filteredUsers = filteredUsers.filter(user => user.role === roleFilter);
    }

    if (statusFilter) {
        filteredUsers = filteredUsers.filter(user => user.status === statusFilter);
    }

    currentPage = 1;
    renderUserTable();
}

function handleLogout() {
    if (confirm('确定要退出登录吗？')) {
        // 清除登录信息
        localStorage.removeItem('userToken');
        localStorage.removeItem('userInfo');
        // 跳转到登录页
        window.APP_CONFIG.navigateTo('index.html');
    }
}
</script>
