};

let editingRoleId = null;
let currentPage = 1;
let pageSize = 10;
let filteredRoles = [];

// 角色用户列表相关变量
let currentRoleId = null;
let currentRoleUsers = [];
let filteredRoleUsers = [];
let roleUsersCurrentPage = 1;
let roleUsersPageSize = 10;

document.addEventListener('DOMContentLoaded', function() {
    filteredRoles = [...rolesData];
    renderRoleTable();
    setupSearch();
});

function renderRoleTable() {
    const totalPages = Math.ceil(filteredRoles.length / pageSize);
    const startIndex = (currentPage - 1) * pageSize;
    const endIndex = startIndex + pageSize;
    const currentRoles = filteredRoles.slice(startIndex, endIndex);

    const tbody = document.getElementById('roleTableBody');

    if (currentRoles.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-sm text-slate-400">未找到匹配的角色</td></tr>';
        updatePagination(0, 0);
        return;
    }

    tbody.innerHTML = currentRoles.map(role => `
        <tr class="hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors">
            <td class="px-6 py-4">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary text-lg">admin_panel_settings</span>
                    <span class="text-sm font-medium text-slate-800 dark:text-white">${role.name}</span>
                </div>
            </td>
            <td class="px-6 py-4">
                <span class="px-2 py-1 text-xs font-mono bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-300 rounded">${role.code}</span>
            </td>
            <td class="px-6 py-4">
                <button onclick="showRoleUsers(${role.id})" class="text-sm text-primary hover:text-primary/80 font-medium transition-colors cursor-pointer hover:underline" title="查看该角色下的用户">
                    ${role.userCount} 人
                </button>
            </td>
            <td class="px-6 py-4">
                <span class="px-2 py-1 text-xs font-medium rounded-full ${role.status === 'active' ? 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400' : 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400'}">
                    ${role.status === 'active' ? '启用' : '禁用'}
                </span>
            </td>
            <td class="px-6 py-4">
                <span class="text-sm text-slate-600 dark:text-slate-400">${role.createTime}</span>
            </td>
            <td class="px-6 py-4">
                <span class="text-sm text-slate-600 dark:text-slate-400">${role.desc || '-'}</span>
            </td>
            <td class="px-6 py-4 text-right">
                <div class="flex items-center justify-end gap-2">
                    <button onclick="showEditRoleModal(${role.id})" class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition-colors" title="编辑">
                        <span class="material-symbols-outlined text-base text-slate-600 dark:text-slate-400">edit</span>
                    </button>
                    <button onclick="toggleRoleStatus(${role.id})" class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition-colors" title="${role.status === 'active' ? '禁用' : '启用'}">
                        <span class="material-symbols-outlined text-base text-slate-600 dark:text-slate-400">${role.status === 'active' ? 'block' : 'check_circle'}</span>
                    </button>
                    <button onclick="deleteRole(${role.id})" class="p-1.5 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors" title="删除">
                        <span class="material-symbols-outlined text-base text-red-500">delete</span>
                    </button>
                </div>
            </td>
        </tr>
    `).join('');

    updatePagination(filteredRoles.length, totalPages);
}

function updatePagination(total, totalPages) {
    document.getElementById('totalRoles').textContent = total;

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const pageNumbers = document.getElementById('pageNumbers');

    prevBtn.disabled = currentPage === 1;
    nextBtn.disabled = currentPage === totalPages || totalPages === 0;

    pageNumbers.innerHTML = '';
    for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
            const btn = document.createElement('button');
            btn.textContent = i;
            btn.className = `px-3 py-1.5 text-sm rounded-lg transition-colors ${i === currentPage ? 'bg-primary text-white' : 'border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800'}`;
            btn.onclick = () => goToPage(i);
            pageNumbers.appendChild(btn);
        } else if (i === currentPage - 2 || i === currentPage + 2) {
            const span = document.createElement('span');
            span.textContent = '...';
            span.className = 'px-2 text-slate-400';
            pageNumbers.appendChild(span);
        }
    }
}

function changePage(direction) {
    if (direction === 'prev' && currentPage > 1) {
        currentPage--;
        renderRoleTable();
    } else if (direction === 'next') {
        const totalPages = Math.ceil(filteredRoles.length / pageSize);
        if (currentPage < totalPages) {
            currentPage++;
            renderRoleTable();
        }
    }
}

function goToPage(page) {
    currentPage = page;
    renderRoleTable();
}

function renderPermissions(selectedPermissions = []) {
    const container = document.getElementById('permissionsContainer');
    container.innerHTML = permissionsList.map(perm => `
        <label class="flex items-center gap-2 cursor-pointer group">
            <input type="checkbox" value="${perm.id}" ${selectedPermissions.includes(perm.id) ? 'checked' : ''} class="w-4 h-4 text-primary border-slate-300 dark:border-slate-600 rounded focus:ring-2 focus:ring-primary">
            <span class="material-symbols-outlined text-lg text-slate-600 dark:text-slate-400 group-hover:text-primary transition-colors">${perm.icon}</span>
            <span class="text-sm text-slate-700 dark:text-slate-300 group-hover:text-primary transition-colors">${perm.name}</span>
        </label>
    `).join('');
}

function showAddRoleModal() {
    editingRoleId = null;
    document.getElementById('roleModalTitle').textContent = '新增角色';
    document.getElementById('roleNameInput').value = '';
    document.getElementById('roleCodeInput').value = '';
    document.getElementById('roleDescInput').value = '';
    renderPermissions([]);
    document.getElementById('roleModal').classList.remove('hidden');
}

function showEditRoleModal(roleId) {
    const role = rolesData.find(r => r.id === roleId);
    if (!role) return;

    editingRoleId = roleId;
    document.getElementById('roleModalTitle').textContent = '编辑角色';
    document.getElementById('roleNameInput').value = role.name;
    document.getElementById('roleCodeInput').value = role.code;
    document.getElementById('roleDescInput').value = role.desc || '';
    renderPermissions(role.permissions);
    document.getElementById('roleModal').classList.remove('hidden');
}

function closeRoleModal() {
    document.getElementById('roleModal').classList.add('hidden');
}

function saveRole() {
    const name = document.getElementById('roleNameInput').value.trim();
    const code = document.getElementById('roleCodeInput').value.trim();
    const desc = document.getElementById('roleDescInput').value.trim();
    const permissions = Array.from(document.querySelectorAll('#permissionsContainer input:checked')).map(cb => cb.value);

    if (!name || !code) {
        alert('请填写必填项');
        return;
    }

    if (editingRoleId) {
        const role = rolesData.find(r => r.id === editingRoleId);
        if (role) {
            role.name = name;
            role.code = code;
            role.desc = desc;
            role.permissions = permissions;
        }
    } else {
        rolesData.push({
            id: Date.now(),
            name,
            code,
            desc,
            userCount: 0,
            status: 'active',
            createTime: new Date().toISOString().split('T')[0],
            permissions
        });
    }

    closeRoleModal();
    renderRoleTable();
}

function toggleRoleStatus(roleId) {
    const role = rolesData.find(r => r.id === roleId);
    if (role) {
        role.status = role.status === 'active' ? 'inactive' : 'active';
        renderRoleTable();
    }
}

function deleteRole(roleId) {
    const role = rolesData.find(r => r.id === roleId);
    if (!role) return;

    if (role.userCount > 0) {
        alert('该角色下有用户，无法删除');
        return;
    }

    if (confirm(`确定要删除角色"${role.name}"吗？`)) {
        const index = rolesData.findIndex(r => r.id === roleId);
        if (index !== -1) {
            rolesData.splice(index, 1);
            renderRoleTable();
        }
    }
}

function setupSearch() {
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', function(e) {
        const keyword = e.target.value.trim().toLowerCase();
        filterRoles(keyword);
    });
}

function filterRoles(keyword) {
    if (!keyword) {
        filteredRoles = [...rolesData];
    } else {
        filteredRoles = rolesData.filter(role =>
            role.name.toLowerCase().includes(keyword) ||
            role.code.toLowerCase().includes(keyword)
        );
    }
    currentPage = 1;
    renderRoleTable();
}

function showRoleUsers(roleId) {
    const role = rolesData.find(r => r.id === roleId);
    if (!role) return;

    currentRoleId = roleId;
    currentRoleUsers = roleUsersData[roleId] || [];
    filteredRoleUsers = [...currentRoleUsers];
    roleUsersCurrentPage = 1;

    document.getElementById('roleUsersModalTitle').textContent = `${role.name} - 用户列表`;

    // 设置搜索监听
    const searchInput = document.getElementById('roleUsersSearch');
    searchInput.value = '';
    searchInput.oninput = function(e) {
        const keyword = e.target.value.trim().toLowerCase();
        filterRoleUsers(keyword);
    };

    renderRoleUsersTable();
    document.getElementById('roleUsersModal').classList.remove('hidden');
}

function renderRoleUsersTable() {
    const totalPages = Math.ceil(filteredRoleUsers.length / roleUsersPageSize);
    const startIndex = (roleUsersCurrentPage - 1) * roleUsersPageSize;
    const endIndex = startIndex + roleUsersPageSize;
    const currentUsers = filteredRoleUsers.slice(startIndex, endIndex);

    const tbody = document.getElementById('roleUsersTableBody');
    document.getElementById('roleUsersCount').textContent = filteredRoleUsers.length;

    if (currentUsers.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-sm text-slate-400">该角色下暂无用户</td></tr>';
        updateRoleUsersPagination(0, 0);
        return;
    }

    tbody.innerHTML = currentUsers.map(user => `
        <tr class="hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors">
            <td class="px-4 py-3">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-primary/20 to-primary/5 flex items-center justify-center">
                        <span class="material-symbols-outlined text-primary text-sm">person</span>
                    </div>
                    <span class="text-sm font-medium text-slate-800 dark:text-white">${user.name}</span>
                </div>
            </td>
            <td class="px-4 py-3">
                <span class="text-sm text-slate-600 dark:text-slate-400">${user.phone}</span>
            </td>
            <td class="px-4 py-3">
                <span class="text-sm text-slate-600 dark:text-slate-400">${user.dept}</span>
            </td>
            <td class="px-4 py-3">
                <span class="px-2 py-1 text-xs font-medium rounded-full ${user.status === 'active' ? 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400' : 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400'}">
                    ${user.status === 'active' ? '启用' : '禁用'}
                </span>
            </td>
            <td class="px-4 py-3 text-right">
                <button onclick="removeUserFromRole(${user.id})" class="p-1.5 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors" title="移除">
                    <span class="material-symbols-outlined text-base text-red-500">person_remove</span>
                </button>
            </td>
        </tr>
    `).join('');

    updateRoleUsersPagination(filteredRoleUsers.length, totalPages);
}

function closeRoleUsersModal() {
    document.getElementById('roleUsersModal').classList.add('hidden');
}

function updateRoleUsersPagination(total, totalPages) {
    const prevBtn = document.getElementById('roleUsersPrevBtn');
    const nextBtn = document.getElementById('roleUsersNextBtn');
    const pageNumbers = document.getElementById('roleUsersPageNumbers');

    prevBtn.disabled = roleUsersCurrentPage === 1;
    nextBtn.disabled = roleUsersCurrentPage === totalPages || totalPages === 0;

    pageNumbers.innerHTML = '';
    for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= roleUsersCurrentPage - 1 && i <= roleUsersCurrentPage + 1)) {
            const btn = document.createElement('button');
            btn.textContent = i;
            btn.className = `px-3 py-1.5 text-sm rounded-lg transition-colors ${i === roleUsersCurrentPage ? 'bg-primary text-white' : 'border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800'}`;
            btn.onclick = () => goToRoleUsersPage(i);
            pageNumbers.appendChild(btn);
        } else if (i === roleUsersCurrentPage - 2 || i === roleUsersCurrentPage + 2) {
            const span = document.createElement('span');
            span.textContent = '...';
            span.className = 'px-2 text-slate-400';
            pageNumbers.appendChild(span);
        }
    }
}

function changeRoleUsersPage(direction) {
    if (direction === 'prev' && roleUsersCurrentPage > 1) {
        roleUsersCurrentPage--;
        renderRoleUsersTable();
    } else if (direction === 'next') {
        const totalPages = Math.ceil(filteredRoleUsers.length / roleUsersPageSize);
        if (roleUsersCurrentPage < totalPages) {
            roleUsersCurrentPage++;
            renderRoleUsersTable();
        }
    }
}

function goToRoleUsersPage(page) {
    roleUsersCurrentPage = page;
    renderRoleUsersTable();
}

function filterRoleUsers(keyword) {
    if (!keyword) {
        filteredRoleUsers = [...currentRoleUsers];
    } else {
        filteredRoleUsers = currentRoleUsers.filter(user =>
            user.name.toLowerCase().includes(keyword) ||
            user.phone.includes(keyword)
        );
    }
    roleUsersCurrentPage = 1;
    renderRoleUsersTable();
}

function removeUserFromRole(userId) {
    const user = currentRoleUsers.find(u => u.id === userId);
    if (!user) return;

    if (confirm(`确定要将用户"${user.name}"从当前角色中移除吗？`)) {
        const index = roleUsersData[currentRoleId].findIndex(u => u.id === userId);
        if (index !== -1) {
            roleUsersData[currentRoleId].splice(index, 1);

            // 更新角色的用户数量
            const role = rolesData.find(r => r.id === currentRoleId);
            if (role) {
                role.userCount = roleUsersData[currentRoleId].length;
            }

            // 刷新显示
            currentRoleUsers = roleUsersData[currentRoleId] || [];
            filteredRoleUsers = [...currentRoleUsers];
            renderRoleUsersTable();
            renderRoleTable();
        }
    }
}

function showAddUserToRole() {
    // 获取所有可用用户（不在当前角色中的用户）
    const currentUserIds = new Set(currentRoleUsers.map(u => u.id));
    const allUsers = Object.values(roleUsersData).flat();
    const availableUsers = allUsers.filter(user => !currentUserIds.has(user.id));

    renderAvailableUsers(availableUsers);
    document.getElementById('addUserToRoleModal').classList.remove('hidden');

    // 设置搜索
    const searchInput = document.getElementById('availableUsersSearch');
    searchInput.value = '';
    searchInput.oninput = function(e) {
        const keyword = e.target.value.trim().toLowerCase();
        const filtered = availableUsers.filter(user =>
            user.name.toLowerCase().includes(keyword) ||
            user.phone.includes(keyword)
        );
        renderAvailableUsers(filtered);
    };
}

function renderAvailableUsers(users) {
    const container = document.getElementById('availableUsersList');

    if (users.length === 0) {
        container.innerHTML = '<p class="text-sm text-slate-400 text-center py-8">没有可添加的用户</p>';
        return;
    }

    container.innerHTML = users.map(user => `
        <div class="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-900 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-primary/20 to-primary/5 flex items-center justify-center">
                    <span class="material-symbols-outlined text-primary text-lg">person</span>
                </div>
                <div>
                    <p class="text-sm font-medium text-slate-800 dark:text-white">${user.name}</p>
                    <p class="text-xs text-slate-500 dark:text-slate-400">${user.phone} · ${user.dept}</p>
                </div>
            </div>
            <button onclick="addUserToCurrentRole(${user.id})" class="px-3 py-1.5 text-sm bg-primary hover:bg-primary/90 text-white rounded-lg transition-colors">
                添加
            </button>
        </div>
    `).join('');
}

function addUserToCurrentRole(userId) {
    // 从所有用户中找到该用户
    const allUsers = Object.values(roleUsersData).flat();
    const user = allUsers.find(u => u.id === userId);
    if (!user) return;

    // 添加到当前角色
    if (!roleUsersData[currentRoleId]) {
        roleUsersData[currentRoleId] = [];
    }
    roleUsersData[currentRoleId].push({...user});

    // 更新角色的用户数量
    const role = rolesData.find(r => r.id === currentRoleId);
    if (role) {
        role.userCount = roleUsersData[currentRoleId].length;
    }

    // 刷新显示
    currentRoleUsers = roleUsersData[currentRoleId] || [];
    filteredRoleUsers = [...currentRoleUsers];
    renderRoleUsersTable();
    renderRoleTable();

    // 关闭添加用户模态框
    closeAddUserToRoleModal();
}

function closeAddUserToRoleModal() {
    document.getElementById('addUserToRoleModal').classList.add('hidden');
}

</script>

</body>
</html>
